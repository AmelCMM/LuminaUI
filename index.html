<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaUI - Flutter Style UI Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }
        
        button, input {
            font-family: inherit;
        }
        
        /* Smooth animations */
        button {
            transition: all 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import  {App } from './lumina-ui.js';
        import { mount} from './lumina-ui/core/renderer.js';
        
        const root = document.getElementById('root');
        mount(App, root);
        console.log(root);
        console.log('Welcome to LuminaUI!');
        console.log('A Flutter-style UI framework for the web');
    </script>
</body>
</html>
